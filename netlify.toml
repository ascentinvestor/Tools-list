[build]
  command = "node build.js"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# CSS/JS assets: 1 week — no immutable since filenames are not hashed yet
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML pages: revalidate every request (Netlify CDN handles invalidation on deploy)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, no-cache"

# Images: 1 day
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Pretty URL rewrites (strip .html extension)
[[redirects]]
  from   = "/tools"
  to     = "/index.html"
  status = 200

